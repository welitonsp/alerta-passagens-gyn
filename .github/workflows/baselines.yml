name: Atualizar Baselines (Estatísticas)

on:
  schedule:
    - cron: '0 3 * * 0' # Roda automaticamente todos os domingos às 03:00 UTC
  workflow_dispatch: # Permite que você clique num botão para rodar na hora

permissions:
  contents: write # Dá permissão ao robô para salvar o ficheiro json

jobs:
  calcular-estatisticas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar Cálculo de Baselines
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }} # <--- A CHAVE MÁGICA AQUI
        run: python build_baselines.py

      - name: Salvar novo JSON no GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Verifica se o ficheiro existe antes de tentar salvar
          if [ -f data/baselines.json ]; then
            git add data/baselines.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Atualizando baselines de preços" && git push)
            echo "✅ Ficheiro salvo com sucesso!"
          else
            echo "⚠️ Ficheiro baselines.json não foi gerado nesta execução (talvez falte o banco de dados). Pulando o commit."
          fi
